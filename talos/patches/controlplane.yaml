cluster:
  proxy:
    # Cilium will replace kube proxy
    disabled: true
  network:
    cni:
      # Use Cilium for CNI
      name: none
  clusterName: homelab
  controlPlane:
    endpoint: https://10.10.100.2
  allowSchedulingOnMasters: true
  apiServer:
    certSANs:
      - "homelab.local"
      - "home.pontifex.dev"
