cluster:
  proxy:
    # Cilium will replace kube proxy
    disabled: true
  network:
    cni:
      # Use Cilium for CNI
      name: none
  clusterName: homelab
  controlPlane:
    endpoint: https://10.10.100.2:6443
  allowSchedulingOnMasters: true
  apiServer:
    certSANs:
      - "homelab.local"
      - "home.pontifex.dev"
machine:
  kubelet:
    defaultRuntimeSeccompProfileEnabled: true
  # Add these so they can be used by k8s downward API
  nodeLabels:
    app.kubernetes.io/cluster: "homelab"
    topology.kubernetes.io/region: home
    topology.kubernetes.io/zone: home-a
