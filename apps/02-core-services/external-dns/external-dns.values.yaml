domainFilters:
  - pontifex.dev

# logLevel: debug
logFormat: json

sources:
  - service

registry: noop
triggerLoopOnEvent: true
interval: 5m

serviceMonitor:
  enabled: true

provider:
  name: cloudflare
env:
  - name: CF_API_TOKEN
    valueFrom:
      secretKeyRef:
        name: cloudflare-api-token
        key: api-token

