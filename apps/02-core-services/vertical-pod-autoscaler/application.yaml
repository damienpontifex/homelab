# yaml-language-server: $schema=https://github.com/adobe-platform/kubernetes-json-schema/raw/refs/heads/master/master-standalone/application-argoproj-v1alpha1.json
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vertical-pod-autoscaler
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/damienpontifex/homelab.git
    targetRevision: HEAD
    path: apps/02-core-services/vertical-pod-autoscaler

  destination:
    name: in-cluster
    namespace: kube-system
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
