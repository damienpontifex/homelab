apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: local-path-test-pvc
  namespace: local-path-storage
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path # Targets your provisioner engine
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: local-path-test-pod
  namespace: local-path-storage
spec:
  # Pod-level security context matching your restricted standards
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: app
      image: alpine:latest
      command: ["/bin/sh", "-c", "while true; do date >> /data/test-file.txt; sleep 5; done"]
      volumeMounts:
        - name: test-storage
          mountPath: /data
      # Container-level strict security boundaries
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: false # Set to false here so the container shell can execute the write step
        capabilities:
          drop:
            - ALL
  volumes:
    - name: test-storage
      persistentVolumeClaim:
        claimName: local-path-test-pvc
