apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cilium

namespace: kube-system

helmCharts:
  # https://artifacthub.io/packages/helm/cilium/cilium
  - name: cilium
    repo: https://helm.cilium.io/
    releaseName: cilium
    namespace: kube-system
    valuesFile: cilium.values.yaml
    version: 1.19.6
    includeCRDs: true
