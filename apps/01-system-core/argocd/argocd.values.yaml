global:
  domain: localhost

controller:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

server:
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true

  serviceAccount:
    annotations:
      "azure.workload.identity/client-id": "ea227ff8-7b75-4f0f-83a9-7638e949faf3"
      "azure.workload.identity/tenant-id": "ff2b9041-8733-4fbd-a4e6-23f30567c4a4"

  podLabels:
    "azure.workload.identity/use": "true"

configs:
  params:
    "server.insecure": "true"

  cm:
    "kustomize.buildOptions": "--enable-helm"
    "users.anonymous.enabled": "true"
  rbac:
    "policy.default": "role:org-admin"
    "policy.csv": |
      p, gethomepage, applications, *, */*, role:readonly
      p, role:org-admin, applications, *, */*, allow
      p, role:org-admin, clusters, get, *, allow
      p, role:org-admin, repositories, get, *, allow
      p, role:org-admin, repositories, create, *, allow
      p, role:org-admin, repositories, update, *, allow
      p, role:org-admin, repositories, delete, *, allow
      p, role:org-admin, projects, *, */*, allow
    scopes: "[groups, email]"

