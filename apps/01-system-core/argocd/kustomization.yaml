apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: argocd

resources:
- namespace.yaml

helmCharts:
  # https://artifacthub.io/packages/helm/argo-cd-oci/argo-cd
  - name: argo-cd
    repo: oci://ghcr.io/argoproj/argo-helm
    version: 10.1.4
    releaseName: argocd
    namespace: argocd
    # https://github.com/argoproj/argo-helm/tree/main#charts-use-helm-capabilities
    apiVersions:
      - monitoring.coreos.com/v1
    valuesFile: argocd.values.yaml

