apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cilium-gateway
  namespace: kube-system
spec:
  gatewayClassName: cilium
  addresses:
    - type: IPAddress
      value: 10.10.10.2
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.home.pontifex.dev"
      tls:
        mode: Terminate
        certificateRefs:
          - name: home-pontifex-dev-wildcard-tls-secret
      allowedRoutes:
        namespaces:
          from: All
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All

