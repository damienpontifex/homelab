# yaml-language-server: $schema=https://raw.githubusercontent.com/cilium/cilium/refs/heads/main/install/kubernetes/cilium/values.schema.json
# Basic k3s integration settings
# Required for kube-proxy replacement to work correctly
k8sServiceHost: localhost
# k8sServicePort: 6443
k8sServicePort: 7445 # Talos internal local proxy

# Use native routing (no encapsulation) for best performance
routingMode: "native"
ipv4NativeRoutingCIDR: "10.42.0.0/16" # k3s default pod CIDR
ipam:
  mode: "kubernetes"
  operator:
    clusterPoolIPv4PodCIDRList: ["10.42.0.0/16"]
# Use Node IPs as IPAM
nodeIPAM:
  enabled: true

# Enable eBPF-based kube-proxy replacement for better performance
kubeProxyReplacement: true
autoDirectNodeRoutes: false

bpf:
  masquerade: true

l2announcements:
  enabled: true
gatewayAPI:
  enabled: true
  hostNetwork:
    enabled: true
envoy:
  enabled: true
  securityContext:
    capabilities:
      # Bind to privileged ports
      # https://docs.cilium.io/en/latest/network/servicemesh/gateway-api/gateway-api/#bind-to-privileged-port
      keepCapNetBindService: true
      envoy:
        - NET_ADMIN
        - SYS_ADMIN
        # Add NET_BIND_SERVICE to the list (keep the others!)
        - NET_BIND_SERVICE

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

operator:
  replicas: 1

# Enable Hubble for network observability
hubble:
  relay:
    enabled: true
  ui:
    enabled: true

# BGP Control Plane (for future BGP integration if needed)
bgpControlPlane:
  enabled: true

