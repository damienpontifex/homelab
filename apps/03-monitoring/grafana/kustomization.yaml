apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

resources:
  - certificate.yaml

helmCharts:
  # https://artifacthub.io/packages/helm/grafana-community/grafana
  - repo: oci://ghcr.io/grafana-community/helm-charts
    name: grafana
    version: 12.7.2
    releaseName: grafana
    valuesFile: grafana.values.yaml
    skipTests: true
    namespace: monitoring

