###############################################################
# Receivers configuration
# https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver
###############################################################
receivers:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/k8seventsreceiver/README.md
  k8s_events:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/prometheusreceiver/README.md
  prometheus:
    target_allocator:
      endpoint: http://opentelemetry-target-allocator-ta.monitoring.svc.cluster.local
      interval: 30s
      collector_id: ${OTEL_K8S_POD_NAME}

  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/receiver/k8sobjectsreceiver/README.md
  k8s_objects:
    auth_type: serviceAccount
    include_initial_state: true
    objects:
      - name: verticalpodautoscalers
        mode: watch
        group: autoscaling.k8s.io

processors:
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/blob/main/processor/transformprocessor/README.md
  transform/k8s_objects:
    error_mode: ignore
    log_statements:
      - context: log
        conditions:
          - attributes["k8s.resource.name"] != nil and attributes["k8s.resource.name"] != "events"
        statements:
          - set(resource.attributes["service.name"], "k8s_objects")
          - delete_key(body["metadata"], "managedFields") where IsMap(body)

service:
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, resource_detection]
      exporters: [prometheus_remote_write]
    logs:
      receivers: [k8s_events, k8s_objects]
      processors: [memory_limiter, resource_detection, transform/k8s_objects]
      exporters: [otlp_http/loki]
