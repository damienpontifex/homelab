# yaml-language-server: $schema=https://raw.githubusercontent.com/open-telemetry/opentelemetry-helm-charts/refs/heads/main/charts/opentelemetry-collector/values.schema.json
mode: deployment

extraVolumes:
  - name: otel-collector-config
    configMap:
      name: otel-collector-deployment-config

# RBAC is managed via Kustomize ClusterRole aggregation in deployment/rbac/
clusterRole:
  create: false

