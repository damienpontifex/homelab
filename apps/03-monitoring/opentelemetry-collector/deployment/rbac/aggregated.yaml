# Aggregated ClusterRole for opentelemetry-collector (deployment)
# Rules are automatically populated from child ClusterRoles via aggregation.
# Add a child: create a ClusterRole with label otel.pontifex.dev/aggregate-to-deployment=true
# Remove a child: delete the ClusterRole file and this role auto-updates.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-deployment
  labels:
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: standalone-collector
aggregationRule:
  clusterRoleSelectors:
    - matchLabels:
        otel.pontifex.dev/aggregate-to-deployment: "true"
rules: []
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-deployment
  labels:
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: standalone-collector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-deployment
subjects:
  - kind: ServiceAccount
    name: opentelemetry-collector-deployment
    namespace: monitoring
