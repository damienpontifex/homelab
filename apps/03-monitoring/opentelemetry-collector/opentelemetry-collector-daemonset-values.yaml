# yaml-language-server: $schema=https://raw.githubusercontent.com/open-telemetry/opentelemetry-helm-charts/refs/heads/main/charts/opentelemetry-collector/values.schema.json
mode: daemonset

image:
  repository: otel/opentelemetry-collector-contrib

serviceMonitor:
  enabled: true

# https://opentelemetry.io/docs/platforms/kubernetes/helm/collector/#presets
presets:
  hostMetrics:
    enabled: true
  kubeletMetrics:
    enabled: true
  kubernetesAttributes:
    enabled: true
  # https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/k8seventsreceiver
  logsCollection:
    enabled: true
    includeCollectorLogs: false
  # TODO: which handles https://github.com/open-telemetry/opentelemetry-collector-contrib/tree/main/receiver/k8sobjectsreceiver

config:
  receivers:
    jaeger: null
    zipkin: null
  exporters:
    # https://github.com/open-telemetry/opentelemetry-collector/blob/main/exporter/otlphttpexporter/README.md
    otlphttp/loki:
      endpoint: http://loki-gateway.monitoring.svc.cluster.local/otlp

  service:
    pipelines:
      logs:
        # See recommended order https://github.com/open-telemetry/opentelemetry-collector/blob/main/processor/README.md#recommended-processors
        # TODO: investigate resourcedetection, logdedup processors
        exporters:
          - otlphttp/loki
        # exporters: [debug]
      traces: null

ports:
  jaeger-compact:
    enabled: false
  jaeger-thrift:
    enabled: false
  jaeger-grpc:
    enabled: false
  zipkin:
    enabled: false
  metrics:
    enabled: true
