apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

configMapGenerator:
  - files: 
    - relay=daemonset/otel-config.yaml
    - common=common-otel-config.yaml
    name: otel-collector-daemonset-config
  - files:
    - relay=deployment/otel-config.yaml
    - common=common-otel-config.yaml
    name: otel-collector-deployment-config

resources:
  # Daemonset RBAC — aggregated ClusterRole for opentelemetry-collector-daemonset
  - daemonset/rbac/aggregated.yaml
  - daemonset/rbac/kubelet-stats.yaml
  - daemonset/rbac/k8s-attributes.yaml
  - daemonset/rbac/persistent-volumes.yaml
  # Deployment RBAC — aggregated ClusterRole for opentelemetry-collector-deployment
  - deployment/rbac/aggregated.yaml
  - deployment/rbac/k8s-events.yaml
  - deployment/rbac/k8s-objects.yaml

helmCharts:
  # https://artifacthub.io/packages/helm/opentelemetry-helm/opentelemetry-collector
  # https://github.com/open-telemetry/opentelemetry-helm-charts/tree/main/charts/opentelemetry-collector
  - &otel-common
    name: opentelemetry-collector
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.165.0
    namespace: monitoring
    releaseName: opentelemetry-collector-deployment
    valuesFile: common-values.yaml
    additionalValuesFiles:
      - deployment/values.yaml

  - <<: *otel-common
    releaseName: opentelemetry-collector-daemonset
    additionalValuesFiles:
    - daemonset/values.yaml

  # https://artifacthub.io/packages/helm/opentelemetry-helm/opentelemetry-target-allocator
  - repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    name: opentelemetry-target-allocator
    version: 0.156.0
    releaseName: opentelemetry-target-allocator
    namespace: monitoring

  # https://artifacthub.io/packages/helm/prometheus-community/prometheus-operator-crds
  # - repo: oci://ghcr.io/prometheus-community/charts
  #   name: prometheus-operator-crds
  #   version: 27.0.0
  #   releaseName: prometheus-operator-crds
  #
  # https://artifacthub.io/packages/helm/opentelemetry-helm/opentelemetry-kube-stack
  # - repo: https://open-telemetry.github.io/opentelemetry-helm-charts
  #   name: opentelemetry-kube-stack
  #   # renovate: datasource=helm registryUrl=https://open-telemetry.github.io/opentelemetry-helm-charts depName=opentelemetry-kube-stack
  #   version: 0.17.1
  #   releaseName: opentelemetry-kube-stack
  #   valuesFile: opentelemetry-kube-stack-values.yaml
  #   includeCRDs: true
  #   namespace: monitoring
