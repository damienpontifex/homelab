# RBAC for kubelet_stats receiver volume metadata (k8s_api_config)
# Only needed when collecting PVC/PV metrics
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-daemonset-persistent-volumes
  labels:
    app.kubernetes.io/part-of: opentelemetry-collector
    app.kubernetes.io/component: agent-collector
    otel.pontifex.dev/aggregate-to-daemonset: "true"
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims", "persistentvolumes"]
    verbs: ["get"]
